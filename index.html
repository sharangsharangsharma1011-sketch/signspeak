<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SignSpeak — Sign to Text</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111214">
<style>
  :root{
    --bg-0:#0b0c0d;
    --bg-1:#151618;
    --bg-2:#1c1e21;
    --bg-3:#25282c;
    --text-0:#c8c8cc;
    --text-1:#8a8d93;
    --text-2:#5a5d62;
    --accent:#3aaa92;
    --accent-dim:#2c7d6b;
    --shadow-soft: 0 8px 24px rgba(0,0,0,0.45);
    --shadow-inset: inset 0 1px 0 rgba(255,255,255,0.03);
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}

  html,body{
    margin:0; padding:0; height:100%;
    background:var(--bg-0);
    color:var(--text-0);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    overflow:hidden;
  }

  #app{
    height:100vh;
    height:100dvh;
    display:flex;
    flex-direction:column;
  }

  header{
    padding:18px 20px 12px;
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    flex-shrink:0;
  }

  .brand{
    font-size:15px;
    font-weight:600;
    letter-spacing:0.02em;
    color:var(--text-0);
  }
  .brand span{ color:var(--accent); }

  .status-dot{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:11px;
    color:var(--text-2);
    letter-spacing:0.03em;
    text-transform:uppercase;
  }
  .status-dot .dot{
    width:6px; height:6px; border-radius:50%;
    background:var(--text-2);
    transition:background 0.3s ease;
  }
  .status-dot.live .dot{ background:var(--accent); }
  .status-dot.live{ color:var(--accent); }

  #camera-wrap{
    position:relative;
    margin:0 16px;
    border-radius:20px;
    overflow:hidden;
    background:var(--bg-1);
    box-shadow:var(--shadow-soft), var(--shadow-inset);
    flex:1;
    min-height:0;
  }

  video, canvas{
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    object-fit:cover;
  }

  video{ transform:scaleX(-1); }
  #overlay{ transform:scaleX(-1); }

  #startOverlay{
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:16px;
    background:var(--bg-1);
    z-index:5;
    padding:24px;
    text-align:center;
  }
  #startOverlay p{
    color:var(--text-1);
    font-size:13px;
    max-width:260px;
    line-height:1.5;
    margin:0;
  }

  button{
    font-family:inherit;
    border:none;
    cursor:pointer;
  }

  .btn-primary{
    background:var(--accent);
    color:#0b0c0d;
    font-weight:600;
    font-size:14px;
    padding:13px 28px;
    border-radius:14px;
    box-shadow:0 4px 14px rgba(58,170,146,0.25);
    letter-spacing:0.01em;
  }
  .btn-primary:active{ transform:scale(0.97); }

  #letterBadge{
    position:absolute;
    bottom:16px;
    left:16px;
    background:rgba(21,22,24,0.85);
    backdrop-filter:blur(8px);
    border-radius:16px;
    padding:14px 20px;
    box-shadow:var(--shadow-soft);
    z-index:4;
    min-width:64px;
    text-align:center;
  }
  #letterBadge .letter{
    font-size:34px;
    font-weight:700;
    color:var(--accent);
    line-height:1;
    display:block;
  }
  #letterBadge .conf{
    font-size:10px;
    color:var(--text-2);
    margin-top:4px;
    letter-spacing:0.04em;
    text-transform:uppercase;
  }

  #handCount{
    position:absolute;
    top:16px; right:16px;
    background:rgba(21,22,24,0.85);
    backdrop-filter:blur(8px);
    border-radius:12px;
    padding:8px 12px;
    font-size:11px;
    color:var(--text-2);
    z-index:4;
  }
  #handCount.active{ color:var(--accent); }

  footer{
    flex-shrink:0;
    padding:16px 16px 20px;
  }

  #wordBuffer{
    background:var(--bg-2);
    border-radius:16px;
    padding:16px 18px;
    box-shadow:var(--shadow-inset);
    margin-bottom:12px;
    min-height:52px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
  }

  #wordText{
    font-size:20px;
    font-weight:500;
    letter-spacing:0.02em;
    color:var(--text-0);
    word-break:break-word;
    flex:1;
  }
  #wordText:empty::before{
    content:"Detected letters appear here";
    color:var(--text-2);
    font-weight:400;
    font-size:14px;
  }

  .controls{
    display:flex;
    gap:10px;
  }

  .btn-ghost{
    flex:1;
    background:var(--bg-2);
    color:var(--text-1);
    font-size:13px;
    font-weight:500;
    padding:13px;
    border-radius:14px;
    box-shadow:var(--shadow-inset);
  }
  .btn-ghost:active{ background:var(--bg-3); }

  .btn-icon{
    width:48px;
    flex:none;
    background:var(--bg-2);
    color:var(--text-1);
    font-size:16px;
    border-radius:14px;
    box-shadow:var(--shadow-inset);
    display:flex; align-items:center; justify-content:center;
  }
  .btn-icon.on{ color:var(--accent); }

  .hidden{ display:none !important; }
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="brand">Sign<span>Speak</span></div>
    <div class="status-dot" id="statusDot"><span class="dot"></span><span id="statusText">Idle</span></div>
  </header>

  <div id="camera-wrap">
    <video id="video" playsinline muted></video>
    <canvas id="overlay"></canvas>

    <div id="startOverlay">
      <button class="btn-primary" id="startBtn">Start camera</button>
      <p>Fingerspell the alphabet. Hold each letter steady for a moment to add it to your word.</p>
    </div>

    <div id="handCount" class="hidden">No hand detected</div>

    <div id="letterBadge" class="hidden">
      <span class="letter" id="currentLetter">–</span>
      <span class="conf" id="currentConf">holding</span>
    </div>
  </div>

  <footer>
    <div id="wordBuffer">
      <div id="wordText"></div>
    </div>
    <div class="controls">
      <button class="btn-icon" id="skeletonToggle" title="Toggle skeleton">✋</button>
      <button class="btn-ghost" id="spaceBtn">Space</button>
      <button class="btn-ghost" id="backspaceBtn">⌫ Delete</button>
      <button class="btn-ghost" id="clearBtn">Clear</button>
    </div>
  </footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="classifier.js"></script>
<script src="app.js"></script>
</body>
</html>
